# Deploy na VM Oracle (Docker Compose) após push na branch principal.
# Build da imagem roda no GitHub Actions; na VM só docker pull + build goai + up (leve para Micro).
#
# Job deploy: environment: prd → Secrets/Variables do ambiente **prd** são passados por SSH e gravados em
# deploy/oracle/.env.gotv.deploy na VM (igual ideia ao GoAnimes + .env.goanimes.deploy).
# Na VM, .env manual fica sobretudo para ACME_EMAIL (Caddy). Não é obrigatório pôr GOAI_* no .env:
# vêm do prd → .env.gotv.deploy neste job.
#
# Na VM: ${ROOT}/GoTV, ${ROOT}/GoAI, ${ROOT}/deploy/oracle — ver deploy/oracle/README.md
# Compose: docker-compose.gotv.yml
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY
#   OCI_DEPLOY_ROOT — opcional; default /opt/go (ex.: /home/ubuntu/www)
#   GHCR_PULL_TOKEN, GHCR_USER — opcional (imagem GHCR privada)
#
# Environment **prd** (Settings → Environments → prd → Environment secrets):
#   GOAI_ADMIN_API_KEY, GOAI_GEMINI_API_KEYS
#   GOTV_ADMIN_API_KEY — opcional (admin GoTV)
#
# Environment **prd** — Environment variables:
#   GOAI_GEMINI_MODEL — opcional, ex. gemini-flash-latest
#
# Imagem: ghcr.io/<owner>/gotv:main
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-gotv-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTV_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/gotv:${{ env.GOTV_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/gotv:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: GHCR owner for VM compose
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy GoTV on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ secrets.OCI_DEPLOY_ROOT }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GOTV_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOTV_IMAGE_TAG: main
          GOAI_ADMIN_API_KEY: ${{ secrets.GOAI_ADMIN_API_KEY }}
          GOAI_GEMINI_API_KEYS: ${{ secrets.GOAI_GEMINI_API_KEYS }}
          GOTV_ADMIN_API_KEY: ${{ secrets.GOTV_ADMIN_API_KEY }}
          GOAI_GEMINI_MODEL: ${{ vars.GOAI_GEMINI_MODEL }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GHCR_PULL_TOKEN,GHCR_USER,GOTV_GHCR_OWNER,GOTV_IMAGE_TAG,GOAI_ADMIN_API_KEY,GOAI_GEMINI_API_KEYS,GOTV_ADMIN_API_KEY,GOAI_GEMINI_MODEL
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOTV_GHCR_OWNER="${GOTV_GHCR_OWNER}"
            export GOTV_IMAGE_TAG="${GOTV_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.gotv.deploy"
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv GOAI_ADMIN_API_KEY "${GOAI_ADMIN_API_KEY:-}"
            write_kv GOAI_GEMINI_API_KEYS "${GOAI_GEMINI_API_KEYS:-}"
            write_kv GOAI_GEMINI_MODEL "${GOAI_GEMINI_MODEL:-}"
            write_kv GOTV_ADMIN_API_KEY "${GOTV_ADMIN_API_KEY:-}"
            chmod 600 "${DEPLOY_ENV}" || true
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-${GOTV_GHCR_OWNER}}" --password-stdin
            fi
            cd "${ORACLE_DIR}"
            docker compose -f docker-compose.gotv.yml pull gotv
            if docker compose -f docker-compose.gotv.yml pull goai; then
              echo "goai: using image from GHCR"
            else
              echo "goai: GHCR pull failed, building from ../../GoAI"
              docker compose -f docker-compose.gotv.yml build goai
            fi
            docker compose -f docker-compose.gotv.yml up -d --force-recreate gotv goai

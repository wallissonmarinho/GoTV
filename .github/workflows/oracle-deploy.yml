# Deploy na VM Oracle (Docker Compose) após push na branch principal.
# Na VM: /opt/go/GoAnimes, /opt/go/GoTV e /opt/go/deploy/oracle como em deploy/oracle/README.md
#
# Secrets no repositório GitHub (Settings → Secrets → Actions):
#   OCI_VM_HOST      — IP ou hostname
#   OCI_VM_USER      — ex.: ubuntu
#   OCI_SSH_PRIVATE_KEY — chave privada PEM (multilinha) com acesso SSH à VM
#
# Opcional: OCI_DEPLOY_ROOT — default /opt/go
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-gotv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      OCI_DEPLOY_ROOT: ${{ secrets.OCI_DEPLOY_ROOT }}
    steps:
      - name: Deploy GoTV on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          envs: OCI_DEPLOY_ROOT
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            cd "${ROOT}/GoTV"
            git fetch origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            cd "${ROOT}/deploy/oracle"
            docker compose build gotv
            docker compose up -d gotv

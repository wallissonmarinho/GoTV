# Deploy só **GoTV** na VM Oracle (Docker Compose). GoAI tem oracle-deploy próprio no repo GoAI.
# Build da imagem no GitHub Actions; na VM: docker pull gotv + recreate gotv.
#
# Job deploy: environment **prd** → grava deploy/oracle/.env.gotv.deploy (só variáveis GoTV).
#
# Na VM: ${ROOT}/GoTV, ${ROOT}/deploy/oracle — ver deploy/oracle/README.md
# Compose: docker-compose.gotv.yml
#
# Repository secrets: OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY, OCI_DEPLOY_ROOT (opcional), GHCR_* (opcional)
#
# Environment **prd** — secrets: GOTV_ADMIN_API_KEY (opcional)
# Environment **prd** — variables: (reservado para tuning GoTV no futuro)
#
# Imagem: ghcr.io/<owner>/gotv:main
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-gotv-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTV_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/gotv:${{ env.GOTV_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/gotv:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: GHCR owner for VM compose
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy GoTV on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ secrets.OCI_DEPLOY_ROOT }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GOTV_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOTV_IMAGE_TAG: main
          GOTV_ADMIN_API_KEY: ${{ secrets.GOTV_ADMIN_API_KEY }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GHCR_PULL_TOKEN,GHCR_USER,GOTV_GHCR_OWNER,GOTV_IMAGE_TAG,GOTV_ADMIN_API_KEY
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOTV_GHCR_OWNER="${GOTV_GHCR_OWNER}"
            export GOTV_IMAGE_TAG="${GOTV_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.gotv.deploy"
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv GOTV_ADMIN_API_KEY "${GOTV_ADMIN_API_KEY:-}"
            chmod 600 "${DEPLOY_ENV}" || true
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-${GOTV_GHCR_OWNER}}" --password-stdin
            fi
            cd "${ORACLE_DIR}"
            docker compose -f docker-compose.gotv.yml pull gotv
            docker compose -f docker-compose.gotv.yml up -d --force-recreate gotv

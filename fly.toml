# Fly.io — https://fly.io/docs/reference/configuration/
# 1. Ajuste `app` ao nome da app (`fly apps create <nome>` ou saída do `fly launch`).
# 2. Crie o volume SQLite na mesma região: fly volumes create gotv_data --region gru --size 1
# 3. Com Postgres (DATABASE_URL), remova a secção [mounts] e defina o secret DATABASE_URL.

app = "gotv-br"
primary_region = "gru"

[build]

[env]
  GIN_MODE = "release"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[mounts]
  source = "gotv_data"
  destination = "/app/data"
